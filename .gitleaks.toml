title = "DevSecOps Demo Gitleaks Config"

[extend]
useDefault = true

[[rules]]
id = "aws-secret-key-demo"
description = "Catches the intentional AWS secret key in demo app"
regex = '''(?i)(aws.{0,20})?secret.{0,20}['\"]?[A-Za-z0-9\/\+=]{40}['\"]?'''
tags = ["aws", "secret"]
severity = "CRITICAL"

[allowlist]
description = "Test fixture files are exempt"
paths = [
  '''tests/fixtures/''',
]
